<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YAMA-BRUH — FM Ringtone Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- GLSL background canvas -->
  <canvas id="bg-canvas"></canvas>

  <div id="app">
    <!-- Header plate -->
    <div class="plate-header">
      <div class="brand-group">
        <div class="brand">YAMA-BRUH</div>
        <div class="brand-sub">PortaSound</div>
      </div>
      <div class="model-text">YB-99FM</div>
    </div>

    <!-- Voice Bank -->
    <div class="voice-bank-panel">
      <div class="panel-label">VOICE BANK</div>
      <div class="voice-bank-grid" id="voice-bank-grid">
        <!-- Generated by JS -->
      </div>
    </div>

    <!-- Controls: Display + Voice Selector -->
    <div class="controls-row">
      <div class="display-unit">
        <div class="display-label">VOICE / TEMPO</div>
        <div class="seg-housing">
          <div class="seg-digits" id="seg-digits">00</div>
        </div>
        <div class="preset-readout" id="preset-readout">Grand Piano</div>
        <div class="display-status" id="lcd-info">READY</div>
      </div>

      <div class="voice-selector">
        <div class="panel-label">VOICE SELECTOR</div>
        <div class="selector-grid">
          <button class="sel-btn" data-num="0">0</button>
          <button class="sel-btn" data-num="5">5</button>
          <button class="sel-btn" data-num="1">1</button>
          <button class="sel-btn" data-num="6">6</button>
          <button class="sel-btn" data-num="2">2</button>
          <button class="sel-btn" data-num="7">7</button>
          <button class="sel-btn" data-num="3">3</button>
          <button class="sel-btn" data-num="8">8</button>
          <button class="sel-btn" data-num="4">4</button>
          <button class="sel-btn" data-num="9">9</button>
        </div>
      </div>
    </div>

    <!-- Ringtone IDs -->
    <div class="id-section">
      <div class="panel-label">RANDOM IDs</div>
      <div id="random-ids" class="id-list"></div>
      <div class="panel-label">CUSTOM IDs</div>
      <div id="custom-ids" class="id-list"></div>
    </div>

    <!-- MIDI controls + Piano keyboard -->
    <div class="keyboard-section">
      <div class="midi-row">
        <button id="midi-btn" class="midi-btn">MIDI: OFF</button>
        <select id="midi-select" class="midi-select" disabled>
          <option value="">-- no devices --</option>
        </select>
      </div>
      <div class="keyboard" id="keyboard"></div>
    </div>
  </div>

  <script src="synth.js"></script>
  <script src="midi.js"></script>
  <script src="app.js"></script>
</body>
</html>
