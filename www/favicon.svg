<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Horizontal stripe pattern — the signature PSS-170 logo look -->
    <pattern id="stripes" x="0" y="0" width="64" height="4" patternUnits="userSpaceOnUse">
      <rect width="64" height="2.5" fill="#e8e4dc"/>
      <rect y="2.5" width="64" height="1.5" fill="#a8a49c"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e2e2e"/>
      <stop offset="100%" stop-color="#181818"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a7850"/>
      <stop offset="50%" stop-color="#22ccaa"/>
      <stop offset="100%" stop-color="#1a7850"/>
    </linearGradient>
    <!-- Clip text to apply stripe fill -->
    <clipPath id="textClip">
      <text x="32" y="42" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="38" font-style="italic" text-anchor="middle" letter-spacing="-2">PS</text>
    </clipPath>
  </defs>

  <!-- Dark plastic body -->
  <rect width="64" height="64" rx="8" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="7.5" fill="none" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Striped "PS" text -->
  <g clip-path="url(#textClip)">
    <rect width="64" height="64" fill="url(#stripes)"/>
  </g>

  <!-- Drop shadow on text (behind via layering trick — use another text) -->

  <!-- Teal accent bar -->
  <rect x="8" y="52" width="48" height="2" rx="1" fill="url(#teal)" opacity="0.9"/>

  <!-- Tiny "PortaSound" vibe dot -->
  <circle cx="54" cy="10" r="2" fill="#22ccaa" opacity="0.6"/>
</svg>
